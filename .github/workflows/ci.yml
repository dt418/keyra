name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - run: pnpm install

      - run: pnpm typecheck

      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - run: pnpm install

      - run: pnpm turbo run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - run: pnpm install

      - run: pnpm --filter @keyra/api exec playwright install chromium

      - name: Apply D1 migrations
        run: |
          wrangler d1 execute keyra-db --local --file=database/migrations/0001_users.sql
          wrangler d1 execute keyra-db --local --file=database/migrations/0002_organizations.sql
          wrangler d1 execute keyra-db --local --file=database/migrations/0003_org_members.sql
          wrangler d1 execute keyra-db --local --file=database/migrations/0004_sessions.sql
          wrangler d1 execute keyra-db --local --file=database/migrations/0005_session_cleanup.sql
          wrangler d1 execute keyra-db --local --file=database/migrations/0006_audit_logs.sql
        working-directory: apps/api

      - run: pnpm --filter @keyra/api test:e2e
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
