name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @keyra/api test

  test-dashboard:
    name: Test Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @keyra/dashboard test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-api, test-dashboard]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create .dev.vars for e2e
        working-directory: apps/api
        run: |
          cat > .dev.vars << EOF
          CLOUDFLARE_ACCOUNT_ID=test-account
          CLOUDFLARE_API_TOKEN=test-token
          JWT_SECRET=ci-test-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256
          JWT_REFRESH_SECRET=ci-test-jwt-refresh-secret-key-must-be-at-least-32-bytes-long
          ENVIRONMENT=test
          DISABLE_RATE_LIMIT=1
          EOF
      - run: pnpm --filter @keyra/api test:e2e:setup
      - run: pnpm --filter @keyra/api test:e2e
        env:
          CI: true
