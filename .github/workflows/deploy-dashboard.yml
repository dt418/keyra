name: Deploy Dashboard

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'dashboard-production' || 'dashboard-preview' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Set VITE_API_URL in the GitHub `dashboard-production` environment
          # variables (e.g. https://keyra-api.danhthanh418.workers.dev/api/v1)
          # Otherwise dashboard calls relative /api/v1, which 404s on Pages.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/dashboard
          wranglerVersion: "4"
          command: >-
            pages deploy dist
            --project-name=keyra
            --branch=${{ github.ref_name }}
            --commit-dirty=true
            --commit-message="deploy: ${{ github.sha }}"
