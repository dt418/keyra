name: Publish SDK

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish. Either an exact semver (e.g. 0.2.0) or a bump type (patch|minor|major). Defaults to patch."
        required: false
        default: "patch"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(node -p "require('./packages/sdk-js/package.json').version")
          echo "Current package version: ${CURRENT}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT="${{ inputs.version }}"
            if [[ "${INPUT}" =~ ^(patch|minor|major)$ ]]; then
              IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"
              case "${INPUT}" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            elif [[ "${INPUT}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$ ]]; then
              VERSION="${INPUT}"
            else
              echo "::error::Invalid version input: ${INPUT}. Use semver or bump type (patch|minor|major)."
              exit 1
            fi
          else
            REF="${GITHUB_REF_NAME}"
            if [[ "${REF}" != sdk-v* ]]; then
              echo "::error::Ref ${REF} is not an sdk-v* tag."
              exit 1
            fi
            VERSION="${REF#sdk-v}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing @keyra/sdk-js@${VERSION}"

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ steps.version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @keyra/sdk-js build

      - name: Generate changelog from conventional commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --list 'sdk-v*' --sort=-v:refname | sed -n '2p')
          RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          if [[ -z "$PREV_TAG" ]]; then
            RANGE="${GITHUB_REF_NAME}"
          fi
          {
            echo "## Changes"
            echo ""
            git log "${RANGE}" --pretty=format:"%h %s" \
              | awk '{
                  hash=$1; $1=""; sub(/^[ \t]+/, "");
                  subj=$0;
                  if (subj ~ /^feat/) tag="feat";
                  else if (subj ~ /^fix/) tag="fix";
                  else if (subj ~ /^perf/) tag="perf";
                  else if (subj ~ /^refactor/) tag="refactor";
                  else if (subj ~ /^docs/) tag="docs";
                  else if (subj ~ /^chore/) tag="chore";
                  else if (subj ~ /^test/) tag="test";
                  else if (subj ~ /^ci/) tag="ci";
                  else tag="other";
                  print "- " tag ": " subj " (" hash ")"
                }'
          } > CHANGELOG_RELEASE.md
          cat CHANGELOG_RELEASE.md

      - name: Bump package version
        working-directory: packages/sdk-js
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          echo "package.json version:"
          node -p "require('./package.json').version"

      - name: Publish to npm (provenance)
        working-directory: packages/sdk-js
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "@keyra/sdk-js@${{ steps.version.outputs.version }}"
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
